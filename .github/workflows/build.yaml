name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WASI SDK
        run: |
          WASI_VERSION=24
          WASI_VERSION_FULL=${WASI_VERSION}.0
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VERSION}/wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          tar xf wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux.tar.gz
          sudo mv wasi-sdk-${WASI_VERSION_FULL}-x86_64-linux /opt/wasi-sdk

      - name: Download wokwi-api.h
        run: curl -sL -o src/wokwi-api.h https://raw.githubusercontent.com/wokwi/wokwi-chip-api/main/include/wokwi-api.h

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chip
          path: dist/

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/chip.wasm
            dist/chip.json
